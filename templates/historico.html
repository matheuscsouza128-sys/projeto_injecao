<!DOCTYPE html>
<html>
<head>
    <title>Histórico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .linha {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .tipo {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .detalhe {
            color: #374151;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>📊 Histórico de Apontamentos</h1>

    {% for item in dados %}
        <div class="card">
            <div class="linha"><strong>Máquina:</strong> {{ item[0] }}</div>
            <div class="linha"><strong>Operador:</strong> {{ item[1] }}</div>
            <div class="linha tipo">{{ item[2] }}</div>

            {% if item[3] %}
                <div class="linha detalhe"><strong>Detalhe:</strong> {{ item[3] }}</div>
            {% endif %}

            <div class="linha">{{ item[4] }}</div>
        </div>
    {% endfor %}

</body>
</html>
