<!DOCTYPE html>
<html>
<head>
    <title>Apontamento de Produção</title>
</head>
<body>

    <h2>Máquina {{ maquina }}</h2>
    <h3>Selecione o operador e a ação:</h3>

    {% if status %}
        <p><strong>Último registro:</strong> {{ status }}</p>
    {% endif %}

    <form action="/registrar" method="post">
        <input type="hidden" name="maquina" value="{{ maquina }}">

        <label for="operador"><strong>Operador:</strong></label>
        <select name="operador" id="operador" required>
            <option value="">Selecione</option>
            <option value="João">João</option>
            <option value="Maria">Maria</option>
            <option value="Carlos">Carlos</option>
        </select>

        <br><br>

        <button type="submit" name="tipo" value="Início de Produção">INICIAR PRODUÇÃO</button>
        <button type="submit" name="tipo" value="Fim de Produção">FINALIZAR PRODUÇÃO</button>
        <button type="submit" name="tipo" value="Intercorrência">INTERCORRÊNCIA</button>
        <button type="submit" name="tipo" value="Não Conformidade">NÃO CONFORMIDADE</button>
    </form>

</body>
</html>
