<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apontamento de Produção</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f4f6f8;
            color: #1f2937;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: #ffffff;
            padding: 24px 18px 32px;
        }

        .topo {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            padding: 20px 18px;
            border-radius: 18px;
            margin-bottom: 22px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.12);
        }

        .topo h1 {
            margin: 0;
            font-size: 1.9rem;
        }

        .topo p {
            margin: 8px 0 0;
            opacity: 0.95;
            font-size: 1rem;
        }

        .status-box {
            background: #eef2ff;
            color: #1e3a8a;
            border: 1px solid #c7d2fe;
            border-radius: 14px;
            padding: 14px;
            font-weight: bold;
            margin-bottom: 18px;
        }

        .status {
            background: #ecfeff;
            color: #155e75;
            border: 1px solid #a5f3fc;
            border-radius: 14px;
            padding: 14px;
            font-weight: bold;
            margin-bottom: 18px;
        }

        .erro {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            margin-bottom: 18px;
            border: 1px solid #e5e7eb;
        }

        .label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            background: #fff;
            margin-bottom: 12px;
        }

        .acoes {
            display: grid;
            gap: 14px;
        }

        .acoes button {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 18px 16px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
            transition: transform 0.08s ease, opacity 0.2s ease;
        }

        .acoes button:active {
            transform: scale(0.98);
        }

        .btn-inicio {
            background: #16a34a;
        }

        .btn-fim {
            background: #dc2626;
        }

        .btn-intercorrencia {
            background: #f59e0b;
            color: #111827;
        }

        .btn-nc {
            background: #374151;
        }

        .btn-pausa {
            background: #2563eb;
        }

        .rodape {
            text-align: center;
            font-size: 0.9rem;
            color: #6b7280;
            margin-top: 24px;
        }
    </style>

    <script>
        function definirTipo(tipo) {
            document.getElementById("tipo").value = tipo;
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="topo">
            <h1>Máquina {{ maquina }}</h1>
            <p>Apontamento de produção</p>
        </div>

        <div class="status-box">
            Status atual da máquina: <strong>{{ status_maquina }}</strong>
        </div>

        {% if status %}
            <div class="status {% if 'Erro' in status %}erro{% endif %}">
                {{ status }}
            </div>
        {% endif %}

        <form action="/registrar" method="post">
            <input type="hidden" name="maquina" value="{{ maquina }}">
            <input type="hidden" name="tipo" id="tipo" value="">

            <div class="card">
                <label for="operador" class="label">Operador</label>
                <select name="operador" id="operador" required>
                    <option value="">Selecione o operador</option>
                    <option value="João">João</option>
                    <option value="Maria">Maria</option>
                    <option value="Carlos">Carlos</option>
                </select>

                <label for="detalhe" class="label">Detalhe (se aplicável)</label>
                <select name="detalhe" id="detalhe">
                    <option value="">Selecione quando for NC, Intercorrência ou Pausa</option>

                    <optgroup label="Não Conformidade">
                        <option value="Dimensional">Dimensional</option>
                        <option value="Material errado">Material errado</option>
                        <option value="Sujeira / contaminação">Sujeira / contaminação</option>
                        <option value="Defeito visual">Defeito visual</option>
                        <option value="Máquina descalibrada">Máquina descalibrada</option>
                        <option value="Rebarba excessiva">Rebarba excessiva</option>
                        <option value="Peça incompleta">Peça incompleta</option>
                        <option value="Cor fora do padrão">Cor fora do padrão</option>
                        <option value="Bolha / falha de injeção">Bolha / falha de injeção</option>
                        <option value="Outro">Outro</option>
                    </optgroup>

                    <optgroup label="Intercorrência">
                        <option value="Falta de material">Falta de material</option>
                        <option value="Falta de ferramenta">Falta de ferramenta</option>
                        <option value="Setup / regulagem">Setup / regulagem</option>
                        <option value="Manutenção">Manutenção</option>
                        <option value="Limpeza">Limpeza</option>
                        <option value="Aguardando qualidade">Aguardando qualidade</option>
                        <option value="Reunião técnica">Reunião técnica</option>
                        <option value="Outro">Outro</option>
                    </optgroup>

                    <optgroup label="Pausa">
                        <option value="Café">Café</option>
                        <option value="Almoço">Almoço</option>
                        <option value="Banheiro">Banheiro</option>
                        <option value="Reunião geral">Reunião geral</option>
                        <option value="Troca de turno">Troca de turno</option>
                        <option value="Outro">Outro</option>
                    </optgroup>
                </select>
            </div>

            <div class="acoes">
                <button type="submit" onclick="definirTipo('Início de Produção')" class="btn-inicio">
                    INICIAR PRODUÇÃO
                </button>

                <button type="submit" onclick="definirTipo('Fim de Produção')" class="btn-fim">
                    FINALIZAR PRODUÇÃO
                </button>

                <button type="submit" onclick="definirTipo('Intercorrência')" class="btn-intercorrencia">
                    INTERCORRÊNCIA
                </button>

                <button type="submit" onclick="definirTipo('Não Conformidade')" class="btn-nc">
                    NÃO CONFORMIDADE
                </button>

                <button type="submit" onclick="definirTipo('Pausa')" class="btn-pausa">
                    PAUSA
                </button>
            </div>
        </form>

        <div class="rodape">
            Sistema de apontamento de produção
        </div>
    </div>
</body>
</html>
